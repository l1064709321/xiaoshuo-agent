<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Novel Agent</title>
<link rel="stylesheet" href="/static/style.css?v=30" />
</head>
<body>
<div class="app">
  <!-- 左侧栏 (IDE 式文件树) -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="logo">✦</span> Novel Agent
      <button class="btn ghost sm sidebar-close" id="sidebar-close">✕</button>
    </div>

    <!-- 项目选择器 -->
    <div class="proj-selector dropdown">
      <button class="btn ghost proj-select-btn" id="proj-select-btn">
        <span id="proj-select-label">选择项目 ▾</span>
      </button>
      <div class="menu proj-menu" id="proj-menu">
        <button class="proj-opt" id="new-project-opt">+ 新建项目…</button>
      </div>
    </div>

    <!-- 文件树 -->
    <div class="tree" id="tree">
      <div class="tree-empty" id="tree-empty">
        <div class="tree-empty-icon">📂</div>
        <p>选择或新建一个项目</p>
        <p class="muted">章节、设定、素材将在此以文件树形式展示</p>
      </div>
    </div>
    <div class="tree-actions">
      <button class="btn ghost sm" id="add-element-btn">+ 设定</button>
      <button class="btn ghost sm" id="new-chapter-btn">+ 章节</button>
    </div>
  </aside>

  <!-- 主对话区 -->
  <main class="main">
    <header class="topbar">
      <button class="btn ghost icon-only" id="menu-btn" title="菜单">☰</button>
      <div class="proj-info" id="proj-info">未选择项目</div>
      <div class="status" id="status-bar"></div>
      <span id="run-elapsed" class="run-elapsed" hidden></span>
      <div class="actions">
        <div class="dropdown">
          <button class="btn ghost" id="export-btn">导出 ▾</button>
          <div class="menu" id="export-menu">
            <button data-fmt="txt">TXT 纯文本</button>
            <button data-fmt="md">Markdown</button>
            <button data-fmt="docx">Word (.docx)</button>
            <button data-fmt="html">HTML (可打印 PDF)</button>
          </div>
        </div>
        <button class="btn ghost" id="view-chapter-btn" title="查看章节">章节</button>
        <button class="btn ghost icon-btn with-label" id="clear-chat-btn" title="清空对话">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          <span class="btn-label">清空</span>
        </button>
        <button class="btn ghost icon-btn with-label" id="skills-btn" title="技能市场 (启用/禁用/添加自定义技能)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
          <span class="btn-label">技能</span>
        </button>
        <button class="btn ghost icon-btn with-label" id="runs-btn" title="运行历史 (每次对话的 trace 回放/成本/耗时)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span class="btn-label">历史</span>
        </button>
        <button class="btn ghost icon-btn with-label" id="settings-btn" title="设置 (模型/参数/密钥)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span class="btn-label">设置</span>
        </button>
      </div>
    </header>

    <div class="chat" id="chat">
      <div class="empty" id="empty-state">
        <div class="empty-icon">✦</div>
        <h2>小说创作 Agent</h2>
        <p>先扫榜、再拆书、定文风、建大纲、写正文、毒舌审、质检打回的完整创作闭环。</p>
        <div class="wf-box">
          <div class="wf-title">8 阶段长篇工作流(含审稿循环)</div>
          <div class="wf-list" id="workflow-phases"></div>
        </div>
        <div class="suggestions" id="suggestions">
          <button class="sugg" data-prompt="先帮我扫榜调研,分析 2026 当前最热的悬疑题材方向,再根据结论定文风">从扫榜开始</button>
          <button class="sugg" data-prompt="我已经上传了对标书,帮我拆书解构,提取钩子/节奏/人设/文风等可复用模块">拆书解构</button>
          <button class="sugg" data-prompt="帮我构思一个黄河捞尸人题材的民俗悬疑小说大纲,12章,融合中式志怪与现代悬疑">民俗悬疑大纲</button>
          <button class="sugg" data-prompt="帮我构思一个规则怪谈/无限流小说大纲,12章,死亡游戏+逻辑破局+人性博弈">规则怪谈大纲</button>
        </div>
      </div>
    </div>

    <div class="composer">
      <input type="file" id="upload-input" accept=".txt,.md,.markdown,.text,.docx,.pdf,.epub,.csv,.log" hidden />
      <div class="composer-input-row">
        <button class="composer-icon-btn" id="upload-btn" title="上传素材 (对标书/参考资料)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <textarea id="input" placeholder="输入指令…" rows="1"></textarea>
        <div class="slash-popup hidden" id="slash-popup"></div>
      </div>
      <div class="composer-bottom-row">
        <div class="model-switch dropdown" id="model-switch">
          <button class="composer-icon-btn model-chip" id="model-chip" title="切换模型">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/><path d="M9 3v2M15 3v2M9 19v2M15 19v2M3 9h2M3 15h2M19 9h2M19 15h2"/></svg>
            <span id="model-chip-label">模型</span>
          </button>
          <div class="menu model-menu" id="model-menu"></div>
        </div>
        <button class="btn primary composer-send" id="send-btn" title="发送">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          <span>发送</span>
        </button>
      </div>
    </div>
  </main>

  <!-- 右侧章节预览抽屉 -->
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <span id="drawer-title">章节内容</span>
      <div class="drawer-actions">
        <button class="btn ghost sm" id="drawer-edit">编辑</button>
        <button class="btn primary sm hidden" id="drawer-save">保存</button>
        <button class="btn ghost sm" id="drawer-close">✕</button>
      </div>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
    <textarea class="drawer-edit-area hidden" id="drawer-edit-area"></textarea>
  </aside>
</div>

<!-- toast -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- 设置面板 (右侧) -->
<aside class="settings-panel" id="settings-panel">
  <div class="sp-head">
    <span>⚙ 设置</span>
    <button class="btn ghost sm" id="sp-close">✕</button>
  </div>
  <div class="sp-body" id="sp-body">
    <!-- 动态渲染 -->
  </div>
</aside>

<!-- 技能市场面板 (右侧) -->
<aside class="skills-panel" id="skills-panel">
  <div class="sp-head">
    <span>🧩 技能市场</span>
    <button class="btn ghost sm" id="skp-close">✕</button>
  </div>
  <div class="sp-body" id="skp-body">
    <!-- 状态汇总 -->
    <div class="skp-status" id="skp-status">加载中…</div>

    <!-- Tabs -->
    <div class="skp-tabs">
      <button class="skp-tab active" data-tab="builtin">内置技能</button>
      <button class="skp-tab" data-tab="custom">自定义</button>
      <button class="skp-tab" data-tab="add">+ 添加</button>
    </div>

    <!-- 内置技能 -->
    <div class="skp-section" id="skp-builtin">
      <div class="skp-grid" id="skp-builtin-grid"></div>
    </div>

    <!-- 自定义技能 -->
    <div class="skp-section hidden" id="skp-custom">
      <div class="skp-grid" id="skp-custom-grid"></div>
      <div class="skp-empty hidden" id="skp-custom-empty">
        <div class="skp-empty-icon">📝</div>
        <p>还没有自定义技能</p>
        <p class="muted">切到「+ 添加」可创建自己的技能 Prompt</p>
      </div>
    </div>

    <!-- 添加自定义技能表单 -->
    <div class="skp-section hidden" id="skp-add">
      <div class="skp-form">
        <label class="skp-field">
          <span class="lbl">技能名 (英文/数字/下划线,作为唯一 ID)</span>
          <input id="sk-name" placeholder="例如 my_writing_style" autocomplete="off" />
        </label>
        <label class="skp-field">
          <span class="lbl">显示名</span>
          <input id="sk-label" placeholder="例如 我的写作风格" autocomplete="off" />
        </label>
        <label class="skp-field">
          <span class="lbl">图标 (单个 emoji)</span>
          <input id="sk-icon" placeholder="⭐" maxlength="4" autocomplete="off" />
        </label>
        <label class="skp-field">
          <span class="lbl">描述</span>
          <input id="sk-desc" placeholder="一句话说清这个技能干什么" autocomplete="off" />
        </label>
        <label class="skp-field">
          <span class="lbl">适用 Agent (多选)</span>
          <div class="skp-agents" id="sk-agents">
            <label class="chip"><input type="checkbox" value="orchestrator" checked><span>总编</span></label>
            <label class="chip"><input type="checkbox" value="story-architect"><span>架构师</span></label>
            <label class="chip"><input type="checkbox" value="narrative-writer" checked><span>主笔</span></label>
            <label class="chip"><input type="checkbox" value="character-designer"><span>角色师</span></label>
            <label class="chip"><input type="checkbox" value="consistency-checker"><span>质检员</span></label>
            <label class="chip"><input type="checkbox" value="story-explorer"><span>资料员</span></label>
            <label class="chip"><input type="checkbox" value="worldbuilder"><span>设定管理员</span></label>
          </div>
        </label>
        <label class="skp-field">
          <span class="lbl">Prompt (注入到所选 Agent 的 system prompt 末尾)</span>
          <textarea id="sk-prompt" rows="8" placeholder="在此写你的技能指令。例如:&#10;你写作时必须遵守以下规则:&#10;1. 每段不超过 3 行&#10;2. 对话占比 ≥ 40%&#10;3. 禁用「命运」「如潮水」等词"></textarea>
        </label>
        <div class="skp-form-actions">
          <button class="btn ghost" id="sk-reset">清空</button>
          <button class="btn primary" id="sk-save">保存技能</button>
        </div>
      </div>
    </div>
  </div>
</aside>

<!-- 运行历史面板 (trace 回放) -->
<aside class="settings-panel" id="runs-panel">
  <div class="sp-head">
    <span>📜 运行历史</span>
    <button class="btn ghost sm" id="rp-close">✕</button>
  </div>
  <div class="sp-body" id="rp-body">
    <!-- 项目级聚合指标 -->
    <div class="rp-metrics" id="rp-metrics">加载中…</div>
    <!-- run 列表 -->
    <div class="rp-runs" id="rp-runs"></div>
    <!-- run 详情 + 回放 (点列表项后显示) -->
    <div class="rp-detail hidden" id="rp-detail">
      <div class="rp-detail-head">
        <button class="btn ghost sm" id="rp-back">← 返回列表</button>
        <span id="rp-detail-title"></span>
      </div>
      <div class="rp-timeline" id="rp-timeline"></div>
    </div>
  </div>
</aside>

<!-- 遮罩 (移动端侧栏) -->
<div class="scrim" id="scrim"></div>

<!-- 命令面板 (⌘K / Ctrl+K) -->
<div class="cmdk-overlay hidden" id="cmdk-overlay">
  <div class="cmdk">
    <input class="cmdk-input" id="cmdk-input" placeholder="输入命令或搜索…  (Esc 关闭)" autocomplete="off" />
    <div class="cmdk-list" id="cmdk-list"></div>
  </div>
</div>

<!-- Agent Panel (显示当前活跃 agent 详情) -->
<aside class="agent-panel" id="agent-panel">
  <div class="ap-head">
    <span id="ap-title">Agent 详情</span>
    <button class="btn ghost sm" id="ap-close">✕</button>
  </div>
  <div class="ap-body" id="ap-body"></div>
</aside>

<!-- 新建项目弹窗 -->
<div class="modal" id="proj-modal">
  <div class="modal-card">
    <h3>新建小说项目</h3>
    <label>项目名称<input id="p-name" /></label>
    <label>类型<input id="p-genre" placeholder="悬疑/科幻/仙侠…" /></label>
    <label>文风<input id="p-style" placeholder="冷峻/幽默/细腻…" /></label>
    <label>核心设定<textarea id="p-premise" rows="3"></textarea></label>
    <div class="modal-actions">
      <button class="btn ghost" id="proj-cancel">取消</button>
      <button class="btn primary" id="proj-ok">创建</button>
    </div>
  </div>
</div>

<!-- 添加设定弹窗 -->
<div class="modal" id="elem-modal">
  <div class="modal-card">
    <h3>添加设定</h3>
    <label>类型
      <select id="e-kind">
        <option value="character">角色</option>
        <option value="location">地点</option>
        <option value="lore">世界观/设定</option>
        <option value="timeline">时间线</option>
      </select>
    </label>
    <label>名称<input id="e-name" /></label>
    <label>详情<textarea id="e-detail" rows="3"></textarea></label>
    <div class="modal-actions">
      <button class="btn ghost" id="elem-cancel">取消</button>
      <button class="btn primary" id="elem-ok">添加</button>
    </div>
  </div>
</div>

<script src="/static/app.js?v=33"></script>
</body>
</html>
