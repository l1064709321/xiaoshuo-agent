# Novel Agent 配置文件
# 把它放到 ~/.novel-agent/config.yaml 或项目根目录,或用环境变量 NOVEL_AGENT_CONFIG 指定。
# api_key 也可以只设环境变量 (OPENAI_API_KEY / ANTHROPIC_API_KEY / GEMINI_API_KEY 等),
# 这里则可不填。

data_dir: ~/.novel-agent
server_host: 0.0.0.0
server_port: 8000

max_steps: 8
chunk_size: 2000
chunk_overlap: 200
retrieve_k: 6

# 默认模型 (agent 实际使用的模型)
default_model:
  model: openai/gpt-4o-mini          # litellm 前缀格式
  api_key: sk-xxx                    # 留空则读环境变量
  api_base:                          # 第三方兼容站可填,如 https://api.siliconflow.cn/v1
  temperature: 0.8
  max_tokens: 4096

# 预设模型列表 (前端可切换 / 预留)
models:
  - model: openai/gpt-4o-mini
    api_key: sk-xxx
  - model: anthropic/claude-3-5-sonnet
    api_key: sk-ant-xxx
  - model: gemini/gemini-2.0-flash
    api_key: xxx
  - model: deepseek/deepseek-chat
    api_key: sk-xxx
  - model: openai/qwen-max            # 通义千问兼容协议
    api_key: sk-xxx
    api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
  - model: openai/glm-4-flash        # 智谱兼容协议
    api_key: xxx
    api_base: https://open.bigmodel.cn/api/paas/v4
  - model: ollama/qwen2.5:14b
    api_base: http://localhost:11434
