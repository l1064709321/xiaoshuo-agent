# Novel Agent 配置文件示例
# 把它复制为 ~/.xiaoshuo-agent/config.yaml 或项目根目录 config.yaml,或用环境变量 NOVEL_AGENT_CONFIG 指定。
# api_key 也可以只设环境变量 (OPENAI_API_KEY / GEMINI_API_KEY / DEEPSEEK_API_KEY 等),这里则可不填。

data_dir: ~/.novel-agent
server_host: 0.0.0.0
server_port: 8000

max_steps: 8
chunk_size: 2000
chunk_overlap: 200
retrieve_k: 6

# 默认模型 (agent 实际使用的模型,litellm 前缀格式)
default_model:
  model: deepseek/deepseek-v4-flash
  api_key:                              # 留空则读环境变量 DEEPSEEK_API_KEY
  api_base:                              # 第三方兼容站可填
  temperature: 0.8
  max_tokens: 4096

# 预设模型列表 (前端「添加模型」可快捷选,也可自行增删)
# 完整厂商预设见 app/config.py 的 PROVIDER_PRESETS
models:
  - model: deepseek/deepseek-v4-flash
    api_key:
  - model: openai/gpt-5.6-terra
    api_key:
  - model: gemini/gemini-3.1-flash
    api_key:
  - model: dashscope/qwen3.6-plus
    api_key:
  - model: zai/glm-5.2
    api_key:
  - model: moonshot/kimi-k2.7-code
    api_key:
  - model: siliconflow/deepseek-ai/DeepSeek-V4-Flash
    api_key:
  - model: ollama/qwen3:14b
    api_base: http://localhost:11434
